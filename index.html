    --border-radius-md: 8px;
    --border-radius-lg: 12px;
  }
  body { margin: 0; background: var(--color-background-primary); }
  .qw{padding:0.75rem; max-width: 800px; margin: 0 auto; font-family:var(--font-sans)}
  .top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.5rem;padding: 0 4px;}
  .stat{font-size:12px;color:var(--color-text-secondary)}
  .stat b{color:var(--color-text-primary);font-weight:500}
  .prog{height:3px;background:var(--color-background-secondary);border-radius:2px;margin-bottom:1rem;overflow:hidden}
  .prog-fill{height:100%;background:#1D9E75;border-radius:2px;transition:width 0.3s}
  .word-card{background:var(--color-background-primary);border:1px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.5rem 0.75rem;text-align:center;margin-bottom:1rem;box-shadow: 0 2px 8px rgba(0,0,0,0.05)}
  .word-en{font-size:26px;font-weight:700;color:var(--color-text-primary);margin:0;word-break: break-word;line-height:1.2}
  .choices{display:grid;gap:10px;margin-bottom:1rem}
  .cb{background:var(--color-background-primary);border:1px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:0.75rem;font-size:14px;color:var(--color-text-primary);cursor:pointer;transition:all 0.2s;text-align:center;line-height:1.3;min-height: 48px;display: flex;align-items: center;justify-content: center;}
  @media (min-width: 600px) {
    .qw { padding: 1.5rem 1rem; }
    .word-en { font-size: 36px; }
    .word-card { padding: 2.5rem 1.5rem; margin-bottom: 1.5rem; }
    .cb { font-size: 15px; padding: 1rem; min-height: 54px; }
    .prog { margin-bottom: 1.5rem; }
    .choices { margin-bottom: 1.5rem; gap: 12px; }
  }
  .cb:hover:not(:disabled){background:var(--color-background-secondary);border-color:var(--color-border-secondary)}
  .cb.correct{background:#EAF3DE;border-color:#639922;color:#3B6D11;font-weight:500}
  .cb.wrong{background:#FCEBEB;border-color:#A32D2D;color:#791F1F}
  .cb:disabled{cursor:default}
  .abtn{width:100%;padding:0.75rem;border-radius:var(--border-radius-md);font-size:14px;font-weight:500;cursor:pointer;border:1px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary);transition: all 0.2s;}
  .abtn:hover{background:var(--color-background-tertiary)}
  .start-btn{background:#1D9E75;color:white;border:none;grid-column: 1 / -1;}
  @media (min-width: 600px) {
    .abtn { padding: 1rem; font-size: 16px; }
    .start-btn { width: auto; padding: 6px 16px; font-size: 13px; grid-column: auto; }
  }
  .result-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:2rem;text-align:center}
  .rscore{font-size:52px;font-weight:500;color:#1D9E75}
  .rlabel{font-size:15px;color:var(--color-text-secondary);margin:0.5rem 0 1.5rem}
  .miss-list{text-align:left;border-top:0.5px solid var(--color-border-tertiary);margin-top:1.5rem;padding-top:1rem}
  .miss-list h3{font-size:13px;font-weight:500;color:var(--color-text-secondary);margin:0 0 0.75rem}
  .miss-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
  .miss-en{color:var(--color-text-primary);font-weight:500}
  .miss-ja{color:var(--color-text-secondary)}
  .settings{display:grid;grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));gap:12px;margin-bottom:1.5rem;padding:12px;background:var(--color-background-secondary);border-radius:var(--border-radius-md)}

</style>

<div class="qw">
  <div id="quiz-section">
    <div class="top-bar">
      <div class="stat">問題 <b id="q-num">1</b> / <b id="q-total">20</b></div>
      <div class="stat">正解 <b id="score">0</b> 問</div>
      <div class="stat" id="streak-display" style="display:none;color:#1D9E75;font-weight:600">🔥 <b id="streak-count">0</b> 連続</div>
    </div>
    <div class="prog"><div class="prog-fill" id="progress" style="width:0%"></div></div>
    <div class="settings" id="settings-bar">
      <div class="s-group">
        <label>出題数</label>
        <select id="q-count">
          <option value="10" selected>10問</option>
          <option value="20">20問</option>
          <option value="50">50問</option>
          <option value="100">100問</option>
        </select>
      </div>
      <div class="s-group">
        <label>難易度</label>
        <select id="difficulty">
          <option value="normal">normal（4択）</option>
          <option value="hard">hard（8択）</option>
        </select>
      </div>
      <div class="s-group">
        <label>モード</label>
        <select id="mode">
          <option value="en-ja">英 → 日</option>
          <option value="ja-en">日 → 英</option>
          <option value="shuffle">シャッフル</option>
        </select>
      </div>
      <button class="abtn start-btn" onclick="startQuiz()">開始 / リセット</button>
    </div>
    <div class="word-card"><div class="word-en" id="word-en">—</div></div>
    <div class="choices" id="choices"></div>
    <button class="abtn" id="next-btn" onclick="nextQuestion()" style="display:none">次の問題 →</button>
  </div>

  <div id="result-section" style="display:none">
    <div class="result-card">
      <div class="badge">赤ユメタン 全1000語</div>
      <div class="rscore" id="final-score"></div>
      <div class="rlabel" id="final-label"></div>
      <button class="abtn" onclick="startQuiz()" style="margin-bottom:0.75rem">もう一度 (同じ設定)</button>
      <button class="abtn" onclick="retryMiss()" id="retry-miss-btn" style="margin-top:0.5rem;border-color:var(--color-border-tertiary);color:var(--color-text-secondary);display:none">間違えた単語だけ再テスト</button>
      <div class="miss-list" id="miss-list"></div>
    </div>
  </div>
</div>

const ALL = RAW.trim().split('\n').map(l => {
  const i = l.indexOf(',');
  return {ja: l.slice(0,i).trim(), en: l.slice(i+1).trim()};
}).filter(w => w.ja && w.en);

let words=[], current=0, score=0, answered=false, missed=[], retryPool=null, streak=0;

function shuffle(a){return [...a].sort(()=>Math.random()-0.5)}

function startQuiz(pool){
  const cnt = parseInt(document.getElementById('q-count').value);
  // poolがある場合は再テストモード
  words = shuffle(pool||retryPool||ALL).slice(0, Math.min(cnt, (pool||retryPool||ALL).length));
  
  // 再テスト時は設定バーのモードを無視するため、wordsにモード情報を付与
  if(pool || retryPool) {
    // すでにモード情報を持っている（再テスト）
  } else {
    // 新規テスト：現在のモードを各単語に付与
    const currentMode = document.getElementById('mode').value;
    words = words.map(w => {
      let mode = currentMode;
      if (currentMode === 'shuffle') {
        mode = Math.random() < 0.5 ? 'en-ja' : 'ja-en';
      }
      return {word: w, mode: mode};
    });
  }
  
  retryPool = null;
  current=0; score=0; missed=[]; answered=false; streak=0;
  document.getElementById('score').textContent=0;
  document.getElementById('q-total').textContent=words.length;
  document.getElementById('streak-display').style.display='none';
  document.getElementById('streak-count').textContent=0;
  document.getElementById('result-section').style.display='none';
  document.getElementById('quiz-section').style.display='block';
  document.getElementById('settings-bar').style.display='flex';
  showQ();
}

function retryMiss(){
  if(!missed.length) return;
  retryPool = missed;
  startQuiz(missed);
}

function showQ(){
  answered=false;
  const item = words[current];
  const w = item.word;
  const mode = item.mode;
  
  // モードに応じて問題文を設定
  document.getElementById('word-en').textContent = mode === 'ja-en' ? w.ja : w.en;
  
  document.getElementById('q-num').textContent=current+1;
  document.getElementById('progress').style.width=Math.round((current/words.length)*100)+'%';
  document.getElementById('next-btn').style.display='none';

  const difficulty = document.getElementById('difficulty').value;
  const choiceCount = difficulty === 'hard' ? 8 : 4;
  const cols = difficulty === 'hard' ? 4 : 2;

  // モードに応じて正解と誤選択肢のプールを設定
  const correct = mode === 'ja-en' ? w.en : w.ja;
  const others = mode === 'ja-en' ? ALL.map(x => x.en) : ALL.map(x => x.ja);
  const filteredOthers = others.filter(x => x !== correct);
  
  const choices = shuffle([correct, ...shuffle(filteredOthers).slice(0, choiceCount - 1)]);

  const c=document.getElementById('choices');
  c.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  c.innerHTML='';
  choices.forEach(ch=>{
    const b=document.createElement('button');
    b.className='cb'; b.textContent=ch;
    b.onclick=()=>pick(b,ch,correct,w);
    c.appendChild(b);
  });
}

function pick(btn,sel,correct,word){
  if(answered) return;
  answered=true;
  document.querySelectorAll('.cb').forEach(b=>{
    b.disabled=true;
    if(b.textContent===correct) b.classList.add('correct');
  });
  if(sel===correct){
    score++; 
    streak++;
    document.getElementById('score').textContent=score;
    if(streak > 3) {
      document.getElementById('streak-display').style.display='inline';
      document.getElementById('streak-count').textContent=streak;
    }
  } else {
    btn.classList.add('wrong'); 
    streak = 0;
    document.getElementById('streak-display').style.display='none';
    const mode = document.getElementById('mode').value;
    // ミスリストにモード情報を含めて保存
    if(!missed.some(m => m.word.en === word.en && m.mode === mode)){
      missed.push({word: word, mode: mode});
    }
  }
  document.getElementById('next-btn').style.display='block';
}

function nextQuestion(){
  current++;
  if(current>=words.length){showResult(); return;}
  showQ();
}

function showResult(){
  document.getElementById('quiz-section').style.display='none';
  document.getElementById('result-section').style.display='block';
  const t=words.length;
  const p=score/t;
  const percent = Math.round(p * 100);
  document.getElementById('final-score').textContent = `${score} / ${t} (${percent}%)`;
  
  if (percent < 80) {
    location.href = 'https://youtu.be/L4J5pxu48v8?si=4PCv2cKCAbu1E54h';
    return;
  }
  
  document.getElementById('final-label').textContent = '';
  document.getElementById('progress').style.width='100%';
  const mb=document.getElementById('retry-miss-btn');
  const currentMode = document.getElementById('mode').value;
  // シャッフルモード以外、かつミスがある場合のみ再テストボタンを表示
  mb.style.display=(missed.length && currentMode !== 'shuffle') ? 'block' : 'none';
  mb.textContent='間違えた '+missed.length+' 問だけ再テスト';
  const ml=document.getElementById('miss-list');
  ml.innerHTML=missed.length
    ?'<h3>間違えた単語</h3>'+missed.map(m=>`<div class="miss-row"><span class="miss-en">${m.word.en}</span><span class="miss-ja">${m.word.ja}</span> <small style="color:var(--color-text-tertiary)">(${m.mode==='ja-en'?'日→英':'英→日'})</small></div>`).join('')
    :'';
}

startQuiz();
</script>
